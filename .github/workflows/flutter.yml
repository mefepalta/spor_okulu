name: Flutter CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          cache: true

      - run: flutter pub get
      - run: flutter analyze

  android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          cache: true

      - run: flutter pub get
      - run: flutter build apk --release

  ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          cache: true

      - run: flutter pub get

      - run: |
          cd ios
          pod install --repo-update

      - run: flutter build ios --no-codesign
