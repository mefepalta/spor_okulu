name: Flutter CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          cache: true

      - run: flutter pub get
      - run: flutter analyze

  android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          cache: true

      - run: flutter pub get
      # CI yalnızca derlemeyi doğrular. Release imzalama anahtarı (keystore) ve
      # key.properties git'e GİRMEZ; K-1 koruması da anahtarsız release
      # paketlemesini bilerek durdurur. Bu yüzden CI'da DEBUG derlenir.
      # İmzalı AAB, key.properties bulunan yerel makinede/manuel üretilir
      # (bkz. YAYIN.md). CI'da imzalı çıktı istenirse keystore GitHub Secrets'a
      # base64 olarak eklenip adımda çözülmeli (denetim: D-2, ertelendi).
      - run: flutter build apk --debug

  ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          cache: true

      - run: flutter pub get

      - run: |
          cd ios
          pod install --repo-update

      - run: flutter build ios --no-codesign
